<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JADDA SPORTS - Inicio de Sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/inicio.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <header class="header">
    <a href="/html/principal.html" class="logo-text">
      JADDA SPORTS
      <span class="logo-sub">SPORT STORE</span>
    </a>
  </header>

  <main class="main-container">
    <div class="form-area">
      <h2>INICIAR SESIÓN</h2>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">CORREO</label>
          <input type="email" class="form-control" id="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">CONTRASEÑA</label>
          <input type="password" class="form-control" id="password" required>
          <div class="form-check mt-2">
            <input type="checkbox" class="form-check-input" id="verPassword">
            <label class="form-check-label">Mostrar contraseña</label>
          </div>
        </div>
        <div class="mb-3 text-end">
    <a href="recuperar.html" style="color: #e73737; text-decoration: none; font-size: 13px; font-family: 'Poppins', sans-serif;">
        ¿Olvidaste tu contraseña?
    </a>
</div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-danger btn-lg">ENTRAR</button>
        </div>

        <div id="errorMensaje" class="alert alert-danger mt-3" style="display:none"></div>
      </form>

      <hr class="my-4">
      <div class="text-center">
        <p class="text-muted small">O CONTINÚA CON</p>
        <div class="d-flex justify-content-center gap-3">
          <a href="/auth/google" class="btn btn-outline-dark d-flex align-items-center px-3">
            <i class="fab fa-google me-2 text-danger"></i> GOOGLE
          </a>
          <a href="/auth/facebook" class="btn btn-outline-dark d-flex align-items-center px-3">
            <i class="fab fa-facebook-f me-2 text-primary"></i> FACEBOOK
          </a>
        </div>

        <div class="text-center mt-4">
          <p class="small">
            ¿NO TIENES CUENTA? <a href="/html/registro.html" class="text-danger fw-bold">REGÍSTRATE</a>
          </p>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>©2025 JADDA SPORTS TODOS LOS DERECHOS RESERVADOS.</p>
  </footer>

  <script src="/js/inicio.js"></script>
<style>
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-12px); }
    80% { transform: translateX(12px); }
  }

  .shake-error {
    /* El !important obliga a que le gane a Bootstrap */
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both !important;
    border: 2px solid #ff4d4d !important;
    box-shadow: 0 0 15px rgba(255, 77, 77, 0.4) !important;
  }
</style>
  
</body>

</html>
