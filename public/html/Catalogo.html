<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JADDA SPORTS - Catálogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="stylesheet" href="/css/catalogo.css" />
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark px-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="/html/principal.html">
        <img src="https://i.postimg.cc/SxjSR241/Black-And-White-Flat-Style-Running-Club-Logo.png" class="logo-img">
      </a>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/html/principal.html">INICIO</a></li>
          <li class="nav-item"><a class="nav-link active" href="/html/catalogo.html">CATÁLOGO</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CATEGORÍAS</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CONTACTO</a></li>
        </ul>

        <input class="form-control w-25 me-3" type="search" placeholder="Buscar...">

        <div class="d-flex align-items-center text-white">
          <span id="userNameDisplay" class="me-3 fw-bold"></span>
          <i class="fas fa-user-circle fs-5 me-3"></i> 
          
          <div id="authButtons">
            <button id="btnLogout" onclick="cerrarSesion()" class="btn btn-outline-light btn-sm" style="display:none;">SALIR</button>
            <div id="guestButtons" style="display:none;">
              <a href="/html/inicio.html" class="btn btn-light btn-sm me-2">LOGIN</a>
              <a href="/html/registro.html" class="btn btn-dark btn-sm">REGISTRO</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="banner text-center py-3">
    <h2>PRODUCTOS</h2>
    <div class="scroll-indicator" style="animation: bounce 2s infinite; font-size: 0.8rem; color: #ffffff;">
        <i class="fas fa-chevron-down"></i> DESLIZA PARA VER MÁS <i class="fas fa-chevron-down"></i>
    </div>
  </div>
</header>

<main class="container">
  <div class="row">
    <aside class="col-md-3 filtros">
      <h4>FILTRAR</h4>
      <div class="form-check"><input class="form-check-input" type="checkbox"> Ropa</div>
      <div class="form-check"><input class="form-check-input" type="checkbox"> Zapatos</div>
      <div class="form-check"><input class="form-check-input" type="checkbox"> Accesorios</div>
    </aside>
    <section class="col-md-9">
      <div id="contenedorProductos" class="row g-4"></div>
    </section>
  </div>
</main>

<footer class="footer">
  <p>©2025 JADDA SPORTS - Pasión por el Deporte</p>
</footer>
<script src="/js/auth-session.js"></script>
<script src="/js/catalogo.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
