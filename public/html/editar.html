<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JADDA SPORTS - Editar Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="editar.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color: #e73737;">
      <a class="navbar-brand" href="#">
        <img src="https://i.postimg.cc/SxjSR241/Black-And-White-Flat-Style-Running-Club-Logo.png" alt="Logo JADDA SPORTS" class="logo-img">
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="#">INICIO</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CATÁLOGO</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CATEGORÍAS</a></li>
          <li class="nav-item"><a class="nav-link" href="#">NOSOTROS</a></li>
          <li class="nav-item"><a class="nav-link" href="#">AYUDA</a></li>
        </ul>
        <form class="d-flex align-items-center" role="search">
          <input class="form-control me-2" type="search" placeholder="Buscar..." />
          <span class="text-white fw-bold">BIENVENIDO</span>
        </form>
      </div>
    </nav>
  </header>

  <main class="container mt-5 pt-4">
    <div class="perfil-box mx-auto text-center">
      <div class="foto-perfil mb-3">
        <img src="https://i.postimg.cc/3x3QzSGq/user-icon.png" alt="Foto de perfil" class="img-fluid rounded-circle">
        <div class="mt-2">
          <button class="btn btn-outline-dark btn-sm">EDITAR FOTO / SUBIR FOTO</button>
        </div>
      </div>

      <form class="text-start mt-4">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre:</label>
          <input type="text" class="form-control" id="nombre" value="Juan Perez">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input type="email" class="form-control" id="email" value="juanperez@gmail.com">
        </div>
        <div class="mb-3">
          <label for="direccion" class="form-label">Dirección:</label>
          <input type="text" class="form-control" id="direccion" value="Cr 64 No. 98-02">
        </div>
        <div class="mb-3">
          <label for="ciudad" class="form-label">Ciudad:</label>
          <input type="text" class="form-control" id="ciudad" value="Bogotá">
        </div>
        <div class="mb-3">
          <label for="codigo" class="form-label">Código Postal:</label>
          <input type="text" class="form-control" id="codigo" value="11001">
        </div>
        <div class="text-end">
          <button type="submit" class="btn btn-danger">GUARDAR CAMBIOS</button>
        </div>
      </form>

      <div class="mt-4">
        <a href="#" class="ayuda-link">¿NECESITAS AYUDA?</a>
      </div>
    </div>
  </main>

  <footer class="footer text-white text-center">
    <p>©2025 JADDASPORTS TODOS LOS DERECHOS RESERVADOS.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
