<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JADDA SPORTS - Recuperar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/registro.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <a href="/html/principal.html" class="logo-text">
      JADDA SPORTS <span class="logo-sub">SPORT STORE</span>
    </a>
  </header>

  <main class="main-container">
    <div class="form-area">
      <div id="registroContenido">
        <h2>RECUPERAR CLAVE</h2>
        <p class="text-center text-muted small" style="font-family: 'Poppins';">
          Ingresa tu email para recibir un enlace de restablecimiento.
        </p>
        
        <form id="formRecuperar">
          <div class="mb-4">
            <label class="form-label">EMAIL</label>
            <input type="email" class="form-control" id="emailRecuperar" required placeholder="ejemplo@correo.com">
          </div>

          <div class="text-center d-grid gap-2">
            <button type="submit" class="btn btn-danger btn-lg" id="btnEnviar">ENVIAR ENLACE</button>
          </div>
        </form>

        <div class="text-center mt-4">
          <p class="small">
            ¿RECORDASTE TU CLAVE? <a href="/html/inicio.html" class="text-danger fw-bold">INICIA SESIÓN</a>
          </p>
        </div>
      </div>

      <div id="mensajeExitoso" style="display:none; text-align:center; margin-top:30px">
        <h3 class="text-warning">
          <i class="fas fa-paper-plane"></i> ¡CORREO ENVIADO! 📩
        </h3>
        <p style="font-family: 'Poppins';">Si el correo existe, recibirás instrucciones en breve. Revisa tu bandeja de entrada o spam.</p>
        <button onclick="window.location.href='/html/inicio.html'" class="btn btn-secondary mt-2">VOLVER AL LOGIN</button>
      </div>
    </div>
  </main>

  <script src="/js/recuperar.js"></script>
</body>
</html>
