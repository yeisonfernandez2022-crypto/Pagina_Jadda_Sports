<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JADDA SPORTS - Quejas o Reclamos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quejas.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color: #e73737;">
      <a class="navbar-brand" href="#">
        <img src="https://i.postimg.cc/SxjSR241/Black-And-White-Flat-Style-Running-Club-Logo.png" alt="Logo JADDA SPORTS" class="logo-img">
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="#">INICIO</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CATÁLOGO</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CATEGORÍAS</a></li>
          <li class="nav-item"><a class="nav-link" href="#">NOSOTROS</a></li>
          <li class="nav-item"><a class="nav-link" href="#">AYUDA</a></li>
        </ul>
        <form class="d-flex align-items-center" role="search">
          <input class="form-control me-2" type="search" placeholder="Buscar..." />
          <span class="text-white fw-bold">BIENVENIDO</span>
        </form>
      </div>
    </nav>
  </header>

  <section class="titulo-seccion text-white text-center">
    <h2>QUEJAS O RECLAMOS</h2>
  </section>

  <main class="container mt-4">
    <div class="row">
      <div class="col-md-6">
        <h5 class="mb-3">INFORMACIÓN DEL USUARIO</h5>
        <form>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre:</label>
            <input type="text" class="form-control" id="nombre" required>
          </div>
          <div class="mb-3">
            <label for="apellido" class="form-label">Apellido:</label>
            <input type="text" class="form-control" id="apellido" required>
          </div>
          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono:</label>
            <input type="tel" class="form-control" id="telefono" required>
          </div>
          <div class="mb-3">
            <label for="correo" class="form-label">Correo:</label>
            <input type="email" class="form-control" id="correo" required>
          </div>
        </form>
      </div>

      <div class="col-md-6">
        <h5 class="mb-3">A CONTINUACIÓN COLOCA TU QUEJA:</h5>
        <textarea class="form-control mb-4" rows="10" placeholder="Escribe tu queja aquí..." required></textarea>
        <div class="d-flex justify-content-between flex-wrap gap-2">
          <button type="reset" class="btn btn-danger">ELIMINAR</button>
          <button type="submit" class="btn btn-success">ENVIAR</button>
        </div>
      </div>
    </div>
    <div class="text-end mt-4">
      <button class="btn btn-dark">SALIR</button>
    </div>
  </main>

  <footer class="footer text-white text-center">
    <p>©2025 JADDASPORTS TODOS LOS DERECHOS RESERVADOS.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
