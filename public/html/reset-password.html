<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JADDA SPORTS - Nueva Clave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/registro.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <a href="/html/principal.html" class="logo-text">
      JADDA SPORTS <span class="logo-sub">SPORT STORE</span>
    </a>
  </header>

  <main class="main-container">
    <div class="form-area">
      <div id="contenedorReset">
        <h2>NUEVA CONTRASEÑA</h2>
        <form id="formReset">
          <div class="mb-3">
            <label class="form-label">NUEVA CONTRASEÑA</label>
            <input type="password" class="form-control" id="newPass" required>
            
            <div id="passwordHelp" style="display:none; margin-top:10px;">
              <small>Debe tener:</small>
              <ul style="font-size:13px; margin:5px 0;">
                <li id="mayus">Una mayúscula</li>
                <li id="simbolo">Un símbolo</li>
                <li id="longitud">Mínimo 7 caracteres</li>
              </ul>
              <div class="progress" style="height: 10px;">
                <div id="barraSeguridad" class="progress-bar" style="width:0%"></div>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">CONFIRMAR CONTRASEÑA</label>
            <input type="password" class="form-control" id="confirmPass" required>
          </div>

          <div class="text-center d-grid gap-2">
            <button type="submit" class="btn btn-danger btn-lg" id="btnActualizar">ACTUALIZAR CLAVE</button>
          </div>
        </form>
      </div>

      <div id="exitoReset" style="display:none; text-align:center; margin-top:30px">
        <h3 class="text-success">
          <i class="fas fa-check-circle"></i> ¡CLAVE ACTUALIZADA! ✅
        </h3>
        <p>Tu contraseña ha sido cambiada. Ya puedes ingresar a tu cuenta.</p>
        <button onclick="window.location.href='/html/inicio.html'" class="btn btn-danger mt-2">INICIAR SESIÓN</button>
      </div>
    </div>
  </main>

  <script src="/js/reset-password.js"></script>
</body>
</html>
